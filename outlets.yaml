      - { url: "https://www.24h.com.vn/upload/rss/tintuctrongngay.rss", section: null }
    sitemaps:
      - https://www.24h.com.vn/sitemap-article-daily.xml

  - slug: soha
    name: Soha
    homepage: https://soha.vn
    outlet_type: popular_lifestyle
    rss:
      - { url: "https://soha.vn/rss/home.rss", section: null }
